<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Rating App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #141414;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1f1f1f;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
        }
        h1 { color: #e50914; margin-bottom: 20px; }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            background-color:#e50914;
            color:white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color#b20710; }
        #result {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4CAF50;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Movie Rater</h1>
    <input type="text" id="movieInput" placeholder="Enter the movie ...">
    <br>
    <button onclick="getRating()">Get Rating</button>
    <div id="result"></div>
</div>

<script>
    function getRating() {
        const movie = document.getElementById('movieInput').value;
        const resultDiv = document.getElementById('result');
        
        if (movie.trim() === "") {
            resultDiv.innerHTML = " Please enter a movie name.";
            resultDiv.style.color = "#ff3333";
            return;
        }       
        const dummyRating = (Math.random() * (10 - 6) + 6).toFixed(1);
        resultDiv.innerHTML = ` ${movie} Rating: ${dummyRating} / 10`;
        resultDiv.style.color = "#4CAF50";
    }
</script>
</body>
</html>
