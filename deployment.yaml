apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-rating-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movie-rating
  template:
    metadata:
      labels:
        app: movie-rating
    spec:
      containers:
      - name: movie-rating-container
        image: <your-dockerhub-username>/movie-rating-app:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: movie-rating-service
spec:
  type: NodePort
  selector:
    app: movie-rating
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30007 
